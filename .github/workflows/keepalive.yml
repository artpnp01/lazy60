name: Keep LAZY60 warm

on:
  schedule:
    - cron: "18 2 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app and Supabase
        run: |
          curl --fail --silent --show-error "https://www.lazy60.com/api/keepalive?key=${{ secrets.KEEPALIVE_SECRET }}"
